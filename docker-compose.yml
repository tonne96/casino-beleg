services:

  # ── 1. Banking-Service ──────────────────────────────────
  banking-service:
    build:
      context: .
      dockerfile: banking-service/Dockerfile
    container_name: casino-banking
    ports:
      - "8080:8080"
    depends_on:
      - banking-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://banking-db:5432/banking_db
      SPRING_DATASOURCE_USERNAME: casino
      SPRING_DATASOURCE_PASSWORD: casino
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true

  banking-db:
    image: postgres:17
    container_name: casino-banking-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: banking_db
      POSTGRES_USER: casino
      POSTGRES_PASSWORD: casino
    volumes:
      - banking-db-data:/var/lib/postgresql/data

  # ── 2. Roulette-Service ─────────────────────────────────
  roulette-service:
    build:
      context: .
      dockerfile: roulette-service/Dockerfile
    container_name: casino-roulette
    ports:
      - "8081:8081"
    depends_on:
      - roulette-db
      - banking-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://roulette-db:5432/roulette_db
      SPRING_DATASOURCE_USERNAME: casino
      SPRING_DATASOURCE_PASSWORD: casino
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true
      BANKING_SERVICE_URL: http://banking-service:8080

  roulette-db:
    image: postgres:17
    container_name: casino-roulette-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: roulette_db
      POSTGRES_USER: casino
      POSTGRES_PASSWORD: casino
    volumes:
      - roulette-db-data:/var/lib/postgresql/data

  # ── 3. Slots-Service ────────────────────────────────────
  slots-service:
    build:
      context: .
      dockerfile: slots-service/Dockerfile
    container_name: casino-slots
    ports:
      - "8082:8082"
    depends_on:
      - slots-db
      - banking-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://slots-db:5432/slots_db
      SPRING_DATASOURCE_USERNAME: casino
      SPRING_DATASOURCE_PASSWORD: casino
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true
      BANKING_SERVICE_URL: http://banking-service:8080

  slots-db:
    image: postgres:17
    container_name: casino-slots-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: slots_db
      POSTGRES_USER: casino
      POSTGRES_PASSWORD: casino
    volumes:
      - slots-db-data:/var/lib/postgresql/data

volumes:
  banking-db-data:
  roulette-db-data:
  slots-db-data: